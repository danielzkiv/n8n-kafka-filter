apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: n8n-kafka-filter
  # Deploy with: gcloud run services replace service.yaml --region=us-central1
spec:
  template:
    metadata:
      annotations:
        # Stateless HTTP service — can scale to zero between requests
        autoscaling.knative.dev/minScale: "0"
    spec:
      serviceAccountName: kafka-n8n-forwarder-sa  # Needs Secret Manager access
      containers:
        - image: gcr.io/bdi-apps-491216/kafka-n8n-forwarder:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          # Waits for Kafka connection before marking ready
          startupProbe:
            httpGet:
              path: /ready
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 6
          # Restarts if pipeline crashes unrecoverably
          livenessProbe:
            httpGet:
              path: /health
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "n8n-kafka-filter"
            # PIPELINES_JSON holds all pipeline configs: ingest secrets, n8n webhook URLs.
            # Store in Secret Manager — it contains secrets.
            - name: PIPELINES_JSON
              valueFrom:
                secretKeyRef:
                  name: pipelines-config
                  key: latest
            # Session secret for signing login cookies (any random string)
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: session-secret
                  key: latest
            # Google OAuth — enables Sign-In for /ui (omit both to disable auth)
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-client-id
                  key: latest
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: google-client-secret
                  key: latest
            # Comma-separated emails allowed to access /ui
            # If empty, any authenticated Google user is allowed
            - name: ALLOWED_EMAILS
              value: ""  # e.g. "user@gmail.com,other@company.com"
