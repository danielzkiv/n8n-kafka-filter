<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n Kafka Filter — Config</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">n8n Kafka Filter</h1>
    <p class="text-sm text-gray-400 mt-0.5">Configure event filters per pipeline</p>
  </div>

  <!-- Pipeline tabs -->
  <div id="tabs" class="flex gap-2 mb-6"></div>

  <!-- Content -->
  <div id="content" class="bg-white rounded-xl border shadow-sm p-6 text-gray-400 text-sm">Loading...</div>

</div>

<script>
const OPERATORS = ['eq','neq','contains','in','exists','regex','gt','gte','lt','lte'];
const EVENT_MODES = ['none','any','all','drop'];

let pipelines = {};
let active = null;

// ── Load ─────────────────────────────────────────────────────────────────────

async function load() {
  const r = await fetch('/api/pipelines');
  pipelines = await r.json();
  const names = Object.keys(pipelines);
  if (!active && names.length) active = names[0];
  renderTabs(names);
  renderPipeline();
}

// ── Tabs ──────────────────────────────────────────────────────────────────────

function renderTabs(names) {
  document.getElementById('tabs').innerHTML = names.map(n => `
    <button onclick="selectPipeline('${n}')"
      class="px-4 py-1.5 rounded-lg text-sm font-medium border transition-colors
        ${active === n ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 hover:bg-gray-50'}">
      ${n}
    </button>`).join('');
}

function selectPipeline(name) {
  active = name;
  renderTabs(Object.keys(pipelines));
  renderPipeline();
}

// ── Main render ───────────────────────────────────────────────────────────────

function renderPipeline() {
  const p = pipelines[active];
  if (!p) return;
  const ef = p.event_filters || {};

  document.getElementById('content').innerHTML = `
    <div class="space-y-6">

      <!-- Basic settings -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Event type field</label>
          <input id="etf" value="${p.event_type_field || 'event_type'}"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="event_type">
          <p class="text-xs text-gray-400 mt-1">Field in the event JSON that holds the event type name</p>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Default action (unknown types)</label>
          <select id="dfm" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="none" ${(p.default_filter_mode||'none')==='none'?'selected':''}>Forward (pass through)</option>
            <option value="drop" ${p.default_filter_mode==='drop'?'selected':''}>Drop (discard)</option>
          </select>
          <p class="text-xs text-gray-400 mt-1">What to do with event types not listed below</p>
        </div>
      </div>

      <!-- Event type filters -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <div>
            <h2 class="text-xs font-semibold text-gray-500 uppercase">Event Type Filters</h2>
            <p class="text-xs text-gray-400">Each event type can have its own filter rules</p>
          </div>
          <button onclick="addEventType()"
            class="text-xs font-medium text-blue-600 hover:text-blue-800 border border-blue-200 px-3 py-1 rounded-lg hover:bg-blue-50">
            + Add event type
          </button>
        </div>

        <div id="et-list" class="space-y-3">
          ${Object.keys(ef).length === 0
            ? `<div class="text-center py-10 border-2 border-dashed rounded-xl text-gray-300 text-sm">
                No event type filters yet.<br>
                <span class="text-xs">Add one above, or use the global filter below.</span>
               </div>`
            : Object.entries(ef).map(([et, cfg]) => eventTypeBlock(et, cfg)).join('')}
        </div>
      </div>

      <!-- Global filter (shown only when no event type filters) -->
      ${Object.keys(ef).length === 0 ? `
      <div id="global-section">
        <h2 class="text-xs font-semibold text-gray-500 uppercase mb-1">Global Filter</h2>
        <p class="text-xs text-gray-400 mb-3">Applied to all events when no event type filters are defined.</p>
        <div class="flex items-center gap-3 mb-3">
          <label class="text-sm text-gray-600 w-12">Mode</label>
          <select id="gfm" class="border rounded-lg px-3 py-1.5 text-sm">
            ${['none','any','all'].map(m=>`<option value="${m}" ${(p.filter_mode||'none')===m?'selected':''}>${m}</option>`).join('')}
          </select>
        </div>
        <div id="global-rules" class="space-y-2">
          ${(p.filter_rules||[]).map(ruleRow).join('')}
        </div>
        <button onclick="addGlobalRule()" class="mt-2 text-xs text-blue-600 hover:text-blue-800">+ Add rule</button>
      </div>` : ''}

      <!-- Save -->
      <div class="flex items-center gap-3 pt-4 border-t">
        <button onclick="save()"
          class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
          Save changes
        </button>
        <span id="status" class="text-sm"></span>
      </div>

    </div>`;
}

// ── Event type block ──────────────────────────────────────────────────────────

function eventTypeBlock(et, cfg) {
  return `
    <div class="border rounded-xl p-4 bg-gray-50" data-et>
      <div class="flex items-center gap-2 mb-3">
        <input class="et-name border rounded-lg px-2 py-1 text-sm font-mono flex-1 bg-white"
          value="${et}" placeholder="order.created">
        <select class="et-mode border rounded-lg px-2 py-1.5 text-sm bg-white">
          ${EVENT_MODES.map(m=>`<option value="${m}" ${cfg.filter_mode===m?'selected':''}>${m}</option>`).join('')}
        </select>
        <button onclick="this.closest('[data-et]').remove()"
          class="text-red-400 hover:text-red-600 text-lg w-6 text-center leading-none">&times;</button>
      </div>
      <div class="rules space-y-2">
        ${(cfg.filter_rules||[]).map(ruleRow).join('')}
      </div>
      <button onclick="addRuleTo(this.previousElementSibling)"
        class="mt-2 text-xs text-blue-600 hover:text-blue-800">+ Add rule</button>
    </div>`;
}

function addEventType() {
  const list = document.getElementById('et-list');
  // Remove empty state if present
  const empty = list.querySelector('.border-dashed');
  if (empty) empty.remove();
  // Remove global section if visible (now using event-type mode)
  const global = document.getElementById('global-section');
  if (global) global.remove();

  const div = document.createElement('div');
  div.className = 'border rounded-xl p-4 bg-gray-50';
  div.setAttribute('data-et', '');
  div.innerHTML = `
    <div class="flex items-center gap-2 mb-3">
      <input class="et-name border rounded-lg px-2 py-1 text-sm font-mono flex-1 bg-white" value="" placeholder="order.created">
      <select class="et-mode border rounded-lg px-2 py-1.5 text-sm bg-white">
        ${EVENT_MODES.map(m=>`<option value="${m}">${m}</option>`).join('')}
      </select>
      <button onclick="this.closest('[data-et]').remove()"
        class="text-red-400 hover:text-red-600 text-lg w-6 text-center leading-none">&times;</button>
    </div>
    <div class="rules space-y-2"></div>
    <button onclick="addRuleTo(this.previousElementSibling)" class="mt-2 text-xs text-blue-600 hover:text-blue-800">+ Add rule</button>`;
  list.appendChild(div);
  div.querySelector('.et-name').focus();
}

// ── Rules ─────────────────────────────────────────────────────────────────────

function ruleRow(r) {
  const val = r.value === null || r.value === undefined ? '' : JSON.stringify(r.value).replace(/^"|"$/g,'');
  return `
    <div class="rule flex items-center gap-2">
      <input class="r-id border rounded px-2 py-1 text-xs text-gray-400 w-24 bg-white" value="${r.rule_id||''}" placeholder="id">
      <input class="r-field border rounded px-2 py-1 text-sm flex-1 bg-white" value="${r.field||''}" placeholder="field.path">
      <select class="r-op border rounded px-2 py-1 text-sm bg-white">
        ${OPERATORS.map(op=>`<option value="${op}" ${r.operator===op?'selected':''}>${op}</option>`).join('')}
      </select>
      <input class="r-val border rounded px-2 py-1 text-sm w-28 bg-white" value="${val}" placeholder="value">
      <button onclick="this.closest('.rule').remove()" class="text-red-400 hover:text-red-600">&times;</button>
    </div>`;
}

function newRuleRow() {
  const div = document.createElement('div');
  div.className = 'rule flex items-center gap-2';
  div.innerHTML = `
    <input class="r-id border rounded px-2 py-1 text-xs text-gray-400 w-24 bg-white" value="" placeholder="id">
    <input class="r-field border rounded px-2 py-1 text-sm flex-1 bg-white" value="" placeholder="field.path">
    <select class="r-op border rounded px-2 py-1 text-sm bg-white">
      ${OPERATORS.map(op=>`<option value="${op}">${op}</option>`).join('')}
    </select>
    <input class="r-val border rounded px-2 py-1 text-sm w-28 bg-white" value="" placeholder="value">
    <button onclick="this.closest('.rule').remove()" class="text-red-400 hover:text-red-600">&times;</button>`;
  return div;
}

function addRuleTo(container) {
  container.appendChild(newRuleRow());
}

function addGlobalRule() {
  document.getElementById('global-rules').appendChild(newRuleRow());
}

// ── Collect & save ────────────────────────────────────────────────────────────

function collectRules(container) {
  return Array.from(container.querySelectorAll('.rule')).map(row => {
    const rawVal = row.querySelector('.r-val').value.trim();
    let value;
    try { value = JSON.parse(rawVal); } catch { value = rawVal || null; }
    return {
      rule_id: row.querySelector('.r-id').value || ('r-' + Math.random().toString(36).slice(2,7)),
      field:    row.querySelector('.r-field').value.trim(),
      operator: row.querySelector('.r-op').value,
      value,
    };
  }).filter(r => r.field);
}

async function save() {
  const status = document.getElementById('status');

  // Event type filters
  const event_filters = {};
  document.querySelectorAll('[data-et]').forEach(block => {
    const et = block.querySelector('.et-name').value.trim();
    if (!et) return;
    event_filters[et] = {
      filter_mode: block.querySelector('.et-mode').value,
      filter_rules: collectRules(block.querySelector('.rules')),
    };
  });

  // Global filter
  const gfmEl = document.getElementById('gfm');
  const grEl  = document.getElementById('global-rules');

  const payload = {
    event_type_field:    document.getElementById('etf').value.trim() || 'event_type',
    default_filter_mode: document.getElementById('dfm').value,
    event_filters,
    filter_mode:  gfmEl ? gfmEl.value : 'none',
    filter_rules: grEl  ? collectRules(grEl) : [],
  };

  try {
    const r = await fetch(`/api/pipelines/${active}/filters`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const res = await r.json();
    if (r.ok) {
      pipelines[active] = { ...pipelines[active], ...payload };
      status.textContent = '✓ Saved';
      status.className = 'text-sm text-green-600 font-medium';
      setTimeout(() => { status.textContent = ''; }, 2000);
    } else {
      status.textContent = '✗ ' + (res.error || 'Error');
      status.className = 'text-sm text-red-500';
    }
  } catch {
    status.textContent = '✗ Network error';
    status.className = 'text-sm text-red-500';
  }
}

load();
</script>
</body>
</html>
